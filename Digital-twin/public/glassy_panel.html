<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbital Downlink Interface</title>
<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: transparent;
            min-height: 500px;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: flex-end;
            overflow: hidden;
            position: relative;
        }

        /* Control Panel - compact */
        .control-panel {
            width: 320px;
            min-height: 500px;
            background: #0a1a2e;
            border: 1px solid rgba(120, 200, 255, 0.25);
            padding: 24px 28px;
            box-shadow:
                0 8px 40px rgba(0, 30, 80, 0.5);
            position: relative;
            overflow: hidden;
        }

        /* Stronger top glass reflection */
        .control-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 45%;
            background: linear-gradient(180deg, 
                rgba(255, 255, 255, 0.12) 0%, 
                rgba(255, 255, 255, 0.04) 40%,
                transparent 100%);
            border-radius: 14px 14px 0 0;
            pointer-events: none;
        }

        /* Cyan edge glow - more prominent */
        .control-panel::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(135deg, 
                rgba(0, 220, 255, 0.4) 0%, 
                transparent 35%,
                transparent 65%,
                rgba(0, 180, 255, 0.3) 100%);
            border-radius: 16px;
            z-index: -1;
            opacity: 0.7;
        }

        /* Corner accents for futuristic feel */
        .corner-accent {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(0, 200, 255, 0.4);
            pointer-events: none;
        }
        .corner-tl { top: 12px; left: 12px; border-right: none; border-bottom: none; }
        .corner-tr { top: 12px; right: 12px; border-left: none; border-bottom: none; }
        .corner-bl { bottom: 12px; left: 12px; border-right: none; border-top: none; }
        .corner-br { bottom: 12px; right: 12px; border-left: none; border-top: none; }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(0, 200, 255, 0.2);
            position: relative;
            z-index: 1;
        }

        .vector-info {
            text-align: right;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .vector-label {
            color: rgba(255, 255, 255, 1);
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 200, 255, 0.3);
        }

        .vector-sub {
            color: rgba(150, 210, 255, 0.7);
            font-size: 10px;
            letter-spacing: 1px;
            font-weight: 500;
        }

        /* Parameters Section */
        .params-section {
            padding-top: 18px;
            padding-bottom: 18px;
            position: relative;
            z-index: 1;
        }

        .param-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            padding: 0 2px;
        }

        .param-label {
            color: rgba(120, 200, 255, 0.85);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .param-value {
            color: rgba(255, 255, 255, 1);
            font-size: 14px;
            font-family: 'Courier New', monospace;
            font-weight: 600;
            letter-spacing: 1px;
            text-shadow: 0 0 8px rgba(0, 200, 255, 0.2);
        }

        /* Separation line - glowing cyan */
        .separator {
            border-top: 1px solid rgba(0, 200, 255, 0.25);
            margin: 22px 0;
            box-shadow: 0 0 6px rgba(0, 200, 255, 0.15);
        }

        .current-operation-label {
            color: rgba(120, 200, 255, 0.85);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        #operationValue {
            color: rgba(255, 255, 255, 1);
            font-size: 14px;
            font-family: 'Courier New', monospace;
            font-weight: 600;
            letter-spacing: 1px;
            min-height: 20px;
            text-shadow: 0 0 8px rgba(0, 200, 255, 0.2);
        }
        
        #current-operation {
            display: none;
        }
        
        .playback-controls {
            margin-top: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .playback-controls button {
            background: rgba(0, 200, 255, 0.2);
            border: 1px solid rgba(0, 200, 255, 0.5);
            color: #fff;
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s;
        }
        
        .playback-controls button:hover {
            background: rgba(0, 200, 255, 0.4);
        }
        
        .playback-controls button#resetBtn {
            background: transparent;
            border: 1px solid rgba(255, 100, 100, 0.3);
            color: rgba(255, 150, 150, 0.9);
        }
        
        .playback-controls button#resetBtn:hover {
            background: rgba(255, 100, 100, 0.1);
        }
        
        .row-counter {
            color: rgba(150, 220, 255, 0.5);
            font-size: 10px;
            letter-spacing: 1px;
        }

        .charts-panel {
            width: 320px;
            background: #0a1a2e;
            border: 1px solid rgba(120, 200, 255, 0.25);
            padding: 24px 28px;
            margin-right: 20px;
            box-shadow: 0 8px 40px rgba(0, 30, 80, 0.5);
            position: relative;
            display: none;
            overflow: hidden;
        }

        .charts-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 45%;
            background: linear-gradient(180deg,
                rgba(255, 255, 255, 0.12) 0%,
                rgba(255, 255, 255, 0.04) 40%,
                transparent 100%);
            border-radius: 14px 14px 0 0;
            pointer-events: none;
        }

        .charts-panel::after {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(135deg,
                rgba(0, 220, 255, 0.4) 0%,
                transparent 35%,
                transparent 65%,
                rgba(0, 180, 255, 0.3) 100%);
            border-radius: 16px;
            z-index: -1;
            opacity: 0.7;
        }

        .charts-header {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .charts-header button {
            background: rgba(255, 100, 100, 0.2);
            border: 1px solid rgba(255, 100, 100, 0.5);
            color: rgba(255, 150, 150, 0.9);
            padding: 6px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .charts-header button:hover {
            background: rgba(255, 100, 100, 0.4);
        }

        #wobChart, #rpmChart {
            width: 100% !important;
            height: 150px !important;
            margin-bottom: 10px;
            border: 1px solid rgba(120, 200, 255, 0.25);
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="control-panel">
        <!-- Futuristic corner accents -->
        <div class="corner-accent corner-tl"></div>
        <div class="corner-accent corner-tr"></div>
        <div class="corner-accent corner-bl"></div>
        <div class="corner-accent corner-br"></div>

        <div class="panel-header">
            <div class="vector-info">
                <div class="vector-label">DRILL OPERATIONS</div>
                <div class="vector-sub">Parameters</div>
            </div>
        </div>

        <div class="params-section">
            <div class="param-row">
                <span class="param-label">WOB</span>
                <span class="param-value" id="wobValue">0</span>
            </div>
            <div class="param-row">
                <span class="param-label">RPM</span>
                <span class="param-value" id="rpmValue">0</span>
            </div>
            <div class="param-row">
                <span class="param-label">SPP</span>
                <span class="param-value" id="sppValue">0</span>
            </div>
            <div class="param-row">
                <span class="param-label">HKLA</span>
                <span class="param-value" id="hklaValue">0</span>
            </div>
            <div class="param-row">
                <span class="param-label">BPOS</span>
                <span class="param-value" id="bposValue">0</span>
            </div>

            <div class="separator"></div>

            <div class="current-operation-label">CURRENT OPERATION</div>
            <div class="param-value" id="operationValue"></div>
            <div class="param-value" id="current-operation"></div>
            
            <div class="separator"></div>
            
            <div class="playback-controls">
                <div class="row-counter">
                    <span id="rowCounter">0</span> / <span id="totalRows">0</span>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button id="playPauseBtn">Play</button>
                    <button id="resetBtn">Reset</button>
                    <button id="toggleChartsBtn">Show Charts</button>
                </div>
            </div>
        </div>
    </div>

    <div class="charts-panel" id="chartsPanel">
        <div class="corner-accent corner-tl"></div>
        <div class="corner-accent corner-tr"></div>
        <div class="corner-accent corner-bl"></div>
        <div class="corner-accent corner-br"></div>

        <div class="charts-header">
            <button id="closeChartsBtn">Close Charts</button>
        </div>

        <canvas id="wobChart"></canvas>
        <canvas id="rpmChart"></canvas>
    </div>

    <!-- PapaParse CSV Parser -->
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Drilling Data Player -->
    <script src="./src/data/drilling_data_player.js"></script>
</body>
</html>
